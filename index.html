<!DOCTYPE html>

<html lang="eng">
    <head>
        <meta charset="utf-8">
        <title>Oldagram</title>
        <link rel="stylesheet" href="./assets/css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />
    </head>

    <body>
        <header>
            <div>
                <img class="logo" src="./assets/images/logo.png" alt="logo">
            </div>
            <div>
                <img class="avatar user-avatar" src="./assets/images/user-avatar.png" alt="user avatar">
            </div>
        </header>

        <main>
            <div class="friend-info-container">
                <div>
                    <img class="avatar friend-avatar" src="./assets/images/avatar-vangogh.jpg">
                </div>
                <div>
                    <span>Vincent van Gogh</span>
                    <span>Zundert, Netherlands</span>
                </div>
            </div>

            <div class="posts-container">
                <img id="user-post" class="post" src="./assets/images/post-vangogh.jpg">

                <div class="icons-container">
                    <span id="heart-icon" class="material-symbols-outlined icons">favorite</span>
                    <img class="icons" src="./assets/images/icon-comment.png">
                    <img class="icons" src="./assets/images/icon-dm.png">
                </div>
                
                <div>
                   <strong><span id="likes" class="not-liked">21492</span> <span>likes</span></strong> 
                    <p><strong>vincey 1853</strong> Jesus is Lord! </p>
                </div>

            </div>
        </main>

        <script src="./assets/js/script.js"></script>
    </body>

</html>
